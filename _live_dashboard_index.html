<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMIC CRM Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#0c0c0f;--s:#16161a;--s2:#1e1e24;--bd:#2a2a32;--t:#e8e6e3;--t2:#9e9ca0;--ac:#6c5ce7;--a2:#a29bfe;--g:#00b894;--y:#fdcb6e;--o:#e17055;--r:#d63031;--b:#0984e3;--tl:#00cec9;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t);font-family:'Noto Sans KR','DM Sans',sans-serif;line-height:1.6;}
.hd{padding:32px 48px 20px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.hd h1{font-family:'DM Sans';font-size:26px;font-weight:700;}.hd h1 em{color:var(--a2);font-style:normal;}
.st{font-size:12px;color:var(--t2);}.st.ok{color:var(--g);}
.btn{background:var(--ac);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR';}
.btn:hover{background:var(--a2);}
.tabs{display:flex;padding:0 48px;border-bottom:1px solid var(--bd);background:var(--s);overflow-x:auto;}
.tab{padding:13px 22px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;user-select:none;white-space:nowrap;}
.tab:hover{color:var(--t);}.tab.active{color:var(--a2);border-bottom-color:var(--ac);}
.ct{padding:28px 48px 60px;}.pg{display:none;}.pg.active{display:block;}
.kr{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:28px;}
.kp{background:var(--s);border:1px solid var(--bd);border-radius:10px;padding:16px 20px;}
.kl{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:0.5px;}
.kv{font-family:'DM Sans';font-size:24px;font-weight:700;margin-top:3px;}
.ks{font-size:11px;color:var(--t2);margin-top:2px;}
.st2{font-size:16px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.st2::before{content:'';width:4px;height:18px;background:var(--ac);border-radius:2px;}
.cd{background:var(--s);border:1px solid var(--bd);border-radius:10px;padding:22px;margin-bottom:22px;}
.sn{color:var(--t2);font-size:12px;margin-bottom:16px;}
.fs{display:flex;align-items:center;margin-bottom:8px;gap:10px;}
.fl{width:120px;text-align:right;font-size:12px;color:var(--t2);flex-shrink:0;}
.ft{flex:1;height:32px;background:var(--s2);border-radius:6px;overflow:hidden;}
.fb{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 12px;font-size:12px;font-family:'DM Sans';font-weight:600;min-width:50px;}
.fv{width:100px;font-family:'DM Sans';font-size:12px;text-align:right;flex-shrink:0;}
.fa{text-align:center;color:var(--t2);font-size:11px;margin:2px 0 2px 120px;}
.rw{overflow-x:auto;}
.rt{border-collapse:separate;border-spacing:3px;font-size:12px;}
.rt th{padding:8px 12px;font-weight:500;color:var(--t2);font-size:11px;white-space:nowrap;text-align:center;}
.rt th:first-child{text-align:left;}
.rt .cl{text-align:left;font-weight:600;color:var(--t);padding:6px 12px;white-space:nowrap;}
.rt .sc{text-align:center;font-family:'DM Sans';color:var(--t2);padding:6px 8px;}
.rc{width:68px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:5px;font-family:'DM Sans';font-weight:600;font-size:12px;cursor:pointer;transition:transform .15s;position:relative;}
.rc:hover{transform:scale(1.08);box-shadow:0 0 0 2px var(--ac);}
.rc .tp{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:5px 8px;border-radius:5px;font-size:10px;white-space:nowrap;z-index:10;}
.rc:hover .tp{display:block;}
.br{display:flex;align-items:center;margin-bottom:7px;gap:10px;}
.bl{width:100px;font-size:12px;color:var(--t2);text-align:right;flex-shrink:0;}
.bt{flex:1;height:24px;background:var(--s2);border-radius:5px;overflow:hidden;}
.bf{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-family:'DM Sans';font-weight:600;min-width:35px;}
.bv{width:70px;font-family:'DM Sans';font-size:12px;text-align:right;flex-shrink:0;}
.tw{overflow-x:auto;max-height:500px;overflow-y:auto;}
.tb{border-collapse:collapse;width:100%;font-size:12px;}
.tb th{background:var(--s2);padding:8px 12px;text-align:left;font-weight:500;color:var(--t2);font-size:11px;position:sticky;top:0;z-index:2;white-space:nowrap;}
.tb td{padding:7px 12px;border-bottom:1px solid var(--bd);white-space:nowrap;}
.tb tr:hover td{background:rgba(108,92,231,.06);}
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
.mo.on{display:flex;}
.md{background:var(--s);border:1px solid var(--bd);border-radius:14px;padding:24px;max-width:560px;width:92%;max-height:80vh;display:flex;flex-direction:column;}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.mh h3{font-size:15px;}.mx{background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px;}
.mi{font-size:12px;color:var(--t2);padding:10px 0;border-top:1px solid var(--bd);}
.ml{overflow-y:auto;flex:1;}.ml table{width:100%;border-collapse:collapse;font-size:12px;}
.ml th{text-align:left;padding:6px 10px;color:var(--t2);font-size:10px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--s);}
.ml td{padding:6px 10px;border-bottom:1px solid var(--bd);}
.ld{text-align:center;padding:60px;color:var(--t2);}
.sp{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 16px;}
@keyframes sp{to{transform:rotate(360deg);}}
@media(max-width:768px){.hd,.ct{padding-left:16px;padding-right:16px;}.tabs{padding:0 16px;}}
</style>
</head>
<body>
<div class="hd"><div><h1><em>MMIC</em> CRM Dashboard</h1><div class="st" id="st">데이터 로딩 중...</div></div><div><button class="btn" onclick="init()">🔄 새로고침</button></div></div>
<div class="tabs"><div class="tab active" data-p="ov">Overview</div><div class="tab" data-p="fn">퍼널 분석</div><div class="tab" data-p="rt">리텐션 코호트</div><div class="tab" data-p="cr">CRM 포커싱</div><div class="tab" data-p="ch">유입 채널</div></div>
<div class="ct">
<div class="ld" id="ld"><div class="sp"></div>구글 시트에서 데이터를 불러오고 있어요...</div>
<div id="db" style="display:none;">
<div class="pg active" id="pg-ov"><div class="kr" id="k1"></div><div class="st2">퍼널 요약</div><div class="cd" id="f1"></div><div class="st2">구매 횟수 분포</div><div class="cd" id="s1"></div></div>
<div class="pg" id="pg-fn"><div class="st2">전체 고객 퍼널</div><p class="sn">가입 → 장바구니 → 구매 → 재구매</p><div class="cd" id="f2"></div><div class="st2" style="margin-top:24px">월별 주문 추이</div><div class="cd" id="f3"></div></div>
<div class="pg" id="pg-rt"><div class="st2">월별 재구매율 코호트 히트맵</div><p class="sn">첫 구매 월 기준. 셀 클릭 → 고객 리스트.</p><div class="cd"><div class="rw" id="rh"></div></div></div>
<div class="pg" id="pg-cr"><div class="kr" id="k2"></div><div class="st2">시그니처 미구매 CRM 포커싱 고객</div><p class="sn">장바구니 금액순. 전환 가능성 높은 고객 우선.</p><div class="cd"><div id="cs"></div><div class="tw" id="ct2" style="margin-top:16px"></div></div></div>
<div class="pg" id="pg-ch"><div class="st2">유입 소스별</div><div class="cd" id="c1"></div><div class="st2" style="margin-top:24px">유입 매체별</div><div class="cd" id="c2"></div></div>
</div></div>
<div class="mo" id="mo" onclick="if(event.target===this)cm()"><div class="md"><div class="mh"><h3 id="mt"></h3><button class="mx" onclick="cm()">✕</button></div><div class="mi" id="mi2"></div><div class="ml" id="ml2"></div></div></div>
<script>
const SID='1UPEWqUhXR8cAiVXmKRmu0v19CuKSfKdpUr_YTOyoqyc';
const GID={crm:0,customers:463195080,orders:206102215,cart:1781705300};
let D={},lc=0,_rl={};
const fm=n=>n!=null?n.toLocaleString('ko-KR'):'-';
const pc=(a,b)=>b>0?(a/b*100).toFixed(1)+'%':'0%';
const fw=n=>{n=+n||0;if(n>=1e8)return'\u20a9'+(n/1e8).toFixed(1)+'\uc5b5';if(n>=1e4)return'\u20a9'+Math.round(n/1e4)+'\ub9cc';return'\u20a9'+fm(n);};

// JSONP fetch via Google Visualization API
function gviz(key,cb){
  const fn='__cb_'+key+'_'+Date.now();
  window[fn]=function(resp){
    delete window[fn];
    if(resp.status==='error'){cb([]);return;}
    const cols=resp.table.cols.map(c=>c.label||c.id);
    const rows=resp.table.rows.map(r=>{
      const obj={};
      r.c.forEach((cell,i)=>{obj[cols[i]]=cell?cell.v:null;});
      return obj;
    });
    cb(rows);
  };
  const s=document.createElement('script');
  s.src='https://docs.google.com/spreadsheets/d/'+SID+'/gviz/tq?tqx=responseHandler:'+fn+'&gid='+GID[key];
  s.onerror=function(){delete window[fn];cb([]);};
  document.body.appendChild(s);
}

function init(){
  lc=0;D={};
  document.getElementById('ld').style.display='block';
  document.getElementById('db').style.display='none';
  document.getElementById('st').className='st';
  document.getElementById('st').textContent='데이터 로딩 중...';
  
  let done=0;
  ['crm','customers','orders','cart'].forEach(k=>{
    gviz(k,function(rows){
      D[k]=rows;done++;
      document.getElementById('st').textContent='로딩 '+done+'/4';
      if(done>=4){
        document.getElementById('st').textContent='\u2713 데이터 로드 완료 · '+new Date().toLocaleString('ko-KR');
        document.getElementById('st').className='st ok';
        document.getElementById('ld').style.display='none';
        document.getElementById('db').style.display='block';
        go();
      }
    });
  });
}

function fc(row){return function(...ns){if(!row)return null;const ks=Object.keys(row);for(const n of ns)if(ks.includes(n))return n;for(const n of ns){const f=ks.find(k=>k.includes(n));if(f)return f;}return null;};}

function pd(s){
  if(!s)return null;
  if(s instanceof Date)return s;
  try{
    if(typeof s==='string'&&(s.includes('오전')||s.includes('오후'))){
      const c=s.replace(/\./g,'').trim().split(/\s+/);
      let y=+c[0],m=+c[1],d=+c[2],ap=c[3],tp=(c[4]||'0:0').split(':'),h=+tp[0],mi=+tp[1]||0;
      if(ap==='오후'&&h!==12)h+=12;if(ap==='오전'&&h===12)h=0;
      return new Date(y,m-1,d,h,mi);
    }
    const d=new Date(s);
    return isNaN(d)?null:d;
  }catch(e){return null;}
}

function go(){
  const crm=D.crm||[],cust=D.customers||[],orders=D.orders||[],cart=D.cart||[];
  console.log('Data:',{crm:crm.length,cust:cust.length,orders:orders.length,cart:cart.length});
  if(orders[0])console.log('OrdCols:',Object.keys(orders[0]));
  if(cart[0])console.log('CartCols:',Object.keys(cart[0]));
  if(crm[0])console.log('CrmCols:',Object.keys(crm[0]));

  const f=fc(orders[0]||{});
  const oI=f('주문자ID','id'),oD=f('주문일시','order_date'),oN=f('주문번호'),oNm=f('주문자명','name'),oG=f('주문 시 회원등급'),oA=f('총 결제금액');

  let fo=orders;if(oG)fo=orders.filter(r=>r[oG]!=='LEVEL 999');
  const uo={};fo.forEach(r=>{const n=oN?r[oN]:JSON.stringify(r);if(!uo[n])uo[n]=r;});
  const dd=Object.values(uo);

  const bm={};
  dd.forEach(r=>{const id=oI?r[oI]:null;if(!id)return;if(!bm[id])bm[id]={id,name:oNm?r[oNm]:'',orders:[]};bm[id].orders.push(r);});
  const buyers=Object.values(bm),nB=buyers.length,nR=buyers.filter(b=>b.orders.length>=2).length,nL=buyers.filter(b=>b.orders.length>=3).length,nS=nB-nR;
  const nC=cust.length,nCa=cart.length,nCr=crm.length;
  const crC=crm.filter(r=>+(r['profile.cartCount']||0)>0).length;

  // KPIs
  document.getElementById('k1').innerHTML=
    kp('전체 고객',fm(nC))+kp('장바구니',fm(nCa),'','var(--b)')+kp('구매 고객',fm(nB),'','var(--g)')+
    kp('재구매 2회+',fm(nR),pc(nR,nB),'var(--a2)')+kp('CRM 포커싱',fm(nCr),'미구매','var(--o)')+kp('CRM 장바구니有',fm(crC),pc(crC,nCr),'var(--tl)');

  // Funnel
  const fd=[{l:'전체 고객',v:nC,c:'var(--t2)'},{l:'장바구니',v:nCa,c:'var(--b)'},{l:'구매',v:nB,c:'var(--g)'},{l:'재구매(2회+)',v:nR,c:'var(--a2)'},{l:'충성(3회+)',v:nL,c:'var(--ac)'}];
  mf('f1',fd);mf('f2',fd);

  // Segments
  const sd=[{n:'1회 구매',c:nS,cl:'var(--o)'},{n:'2회 구매',c:nR-nL,cl:'var(--b)'},{n:'3회+',c:nL,cl:'var(--ac)'}];
  let sh='';sd.forEach(s=>{const w=Math.max(s.c/(nB||1)*100,5);sh+=bar(s.n,s.c,nB,s.cl);});
  document.getElementById('s1').innerHTML=sh;

  // Retention
  if(oD&&oI)brt(dd,oI,oD,oNm);else document.getElementById('rh').innerHTML='<p style="color:var(--t2)">주문 컬럼 인식 불가</p>';
  // Monthly
  mm(dd,oI,oD);
  // CRM
  mc(crm);
  // Channel
  mch(crm);
}

function kp(l,v,s,c){return'<div class="kp"><div class="kl">'+l+'</div><div class="kv"'+(c?' style="color:'+c+'"':'')+'>'+v+'</div>'+(s?'<div class="ks">'+s+'</div>':'')+'</div>';}
function bar(l,c,t,cl){const w=Math.max(c/(t||1)*100,5);return'<div class="br"><div class="bl">'+l+'</div><div class="bt"><div class="bf" style="width:'+w+'%;background:'+cl+';">'+pc(c,t)+'</div></div><div class="bv">'+fm(c)+'명</div></div>';}

function mf(id,data){
  const mx=data[0].v||1;let h='';
  data.forEach((s,i)=>{const w=Math.max(s.v/mx*100,8);h+='<div class="fs"><div class="fl">'+s.l+'</div><div class="ft"><div class="fb" style="width:'+w+'%;background:'+s.c+';">'+pc(s.v,mx)+'</div></div><div class="fv">'+fm(s.v)+'명</div></div>';if(i<data.length-1)h+='<div class="fa">↓ 전환율 '+(data[i+1].v/(s.v||1)*100).toFixed(1)+'%</div>';});
  document.getElementById(id).innerHTML=h;
}

function brt(orders,iC,dC,nC){
  const ps=orders.map(r=>{const d=pd(r[dC]);return{id:r[iC],name:nC?r[nC]:'',date:d,month:d?d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'):null};}).filter(r=>r.date);
  const fp={};ps.forEach(r=>{if(!fp[r.id]||r.date<fp[r.id].date)fp[r.id]=r;});
  ps.forEach(r=>{r.co=fp[r.id].month;const cd=fp[r.id].date;r.off=(r.date.getFullYear()-cd.getFullYear())*12+r.date.getMonth()-cd.getMonth();});
  const ch={};Object.values(fp).forEach(r=>{if(!ch[r.month])ch[r.month]={m:r.month,sz:0,rt:{}};ch[r.month].sz++;});
  _rl={};
  ps.forEach(r=>{if(r.off===0)return;const k=r.co+'_'+r.off;if(!ch[r.co].rt[r.off])ch[r.co].rt[r.off]=new Set();ch[r.co].rt[r.off].add(r.id);if(!_rl[k])_rl[k]={};_rl[k][r.id]=r.name;});

  const so=Object.values(ch).sort((a,b)=>a.m.localeCompare(b.m)),mx=8,now=new Date();
  const gc=r=>{if(r===0)return{b:'#1a1a2e',t:'var(--t2)'};if(r<=1)return{b:'#1e1840',t:'#8888aa'};if(r<=3)return{b:'#2d1f5e',t:'#aaa0d0'};if(r<=6)return{b:'#5b3fa0',t:'#ddd5f0'};if(r<=10)return{b:'#7c5fd4',t:'#fff'};return{b:'#a29bfe',t:'#fff'};};

  let h='<table class="rt"><thead><tr><th>코호트</th><th>크기</th>';
  for(let m=1;m<=mx;m++)h+='<th>M+'+m+'</th>';
  h+='</tr></thead><tbody>';
  so.forEach(c=>{
    if(c.sz<5)return;
    h+='<tr><td class="cl">'+c.m+'</td><td class="sc">'+fm(c.sz)+'명</td>';
    for(let m=1;m<=mx;m++){
      const cp=c.m.split('-'),ty=+cp[0],tm=+cp[1],tgt=new Date(ty+Math.floor((tm+m-1)/12),(tm+m-1)%12);
      if(tgt>now){h+='<td><div class="rc" style="background:transparent;color:var(--bd);">-</div></td>';}
      else{const set=c.rt[m],cnt=set?set.size:0,rate=cnt/c.sz*100,rs=rate.toFixed(1),cl=gc(rate),k=c.m+'_'+m,has=_rl[k];
        h+='<td><div class="rc" style="background:'+cl.b+';color:'+cl.t+';"'+(has?' onclick="sr(\''+c.m+'\','+m+','+cnt+','+c.sz+')"':'')+'>'+rs+'%<span class="tp">'+cnt+'명/'+c.sz+'명'+(has?' · 클릭':'')+'</span></div></td>';}
    }
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('rh').innerHTML=h;
}

function sr(co,off,cnt,sz){
  const cs=_rl[co+'_'+off]||{};
  document.getElementById('mt').textContent=co+' → M+'+off+' 재구매';
  document.getElementById('mi2').textContent=cnt+'명 / '+sz+'명 ('+(cnt/sz*100).toFixed(1)+'%)';
  let h='<table><thead><tr><th>#</th><th>고객 ID</th><th>고객명</th></tr></thead><tbody>';
  let i=1;for(const[id,nm]of Object.entries(cs))h+='<tr><td>'+i++ +'</td><td>'+id+'</td><td>'+(nm||'-')+'</td></tr>';
  h+='</tbody></table>';document.getElementById('ml2').innerHTML=h;document.getElementById('mo').classList.add('on');
}
function cm(){document.getElementById('mo').classList.remove('on');}

function mm(orders,iC,dC){
  if(!dC){document.getElementById('f3').innerHTML='';return;}
  const mb={},mo={};
  orders.forEach(r=>{const d=pd(r[dC]);if(!d)return;const m=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');if(!mb[m])mb[m]=new Set();if(!mo[m])mo[m]=0;mb[m].add(r[iC]);mo[m]++;});
  const ms=Object.keys(mb).sort();
  let h='<div style="overflow-x:auto"><table class="tb"><thead><tr><th>월</th><th>주문건수</th><th>구매고객수</th></tr></thead><tbody>';
  ms.forEach(m=>h+='<tr><td>'+m+'</td><td style="font-family:DM Sans">'+fm(mo[m])+'</td><td style="font-family:DM Sans">'+fm(mb[m].size)+'</td></tr>');
  h+='</tbody></table></div>';document.getElementById('f3').innerHTML=h;
}

function mc(crm){
  const wc=crm.filter(r=>+(r['profile.cartCount']||0)>0),hv=crm.filter(r=>+(r['web.sessionsCount']||0)>=3);
  const rc=crm.filter(r=>{const d=r['profile.signedUpAt'];if(!d)return false;return(new Date()-new Date(d))/864e5<=30;});
  const bo=crm.filter(r=>+(r['profile.cartCount']||0)>0&&+(r['web.sessionsCount']||0)>=3);
  document.getElementById('k2').innerHTML=kp('CRM 전체',fm(crm.length),'미구매')+kp('장바구니有',fm(wc.length),pc(wc.length,crm.length),'var(--tl)')+kp('3회+방문',fm(hv.length),pc(hv.length,crm.length),'var(--y)')+kp('30일내가입',fm(rc.length),'골든타임','var(--g)');
  let sh='<div style="font-size:13px;font-weight:600;margin-bottom:10px">우선순위 타겟</div>';
  [{n:'장바구니+3회방문',c:bo.length,cl:'var(--ac)'},{n:'장바구니有',c:wc.length,cl:'var(--tl)'},{n:'3회+방문',c:hv.length,cl:'var(--y)'},{n:'30일내가입',c:rc.length,cl:'var(--g)'}].forEach(t=>sh+=bar(t.n,t.c,crm.length,t.cl));
  document.getElementById('cs').innerHTML=sh;
  const top=wc.sort((a,b)=>+(b['profile.cartPrice']||0)-+(a['profile.cartPrice']||0)).slice(0,100);
  let th='<table class="tb"><thead><tr><th>고객명</th><th>Member ID</th><th>장바구니</th><th>금액</th><th>방문</th><th>가입일</th><th>유입</th><th>도시</th></tr></thead><tbody>';
  top.forEach(r=>th+='<tr><td style="font-weight:500">'+(r.name||'-')+'</td><td style="font-family:DM Sans;font-size:11px;color:var(--t2)">'+(r.memberId||'-')+'</td><td>'+(r['profile.cartCount']||0)+'건</td><td style="font-family:DM Sans">'+fw(r['profile.cartPrice'])+'</td><td>'+(r['web.sessionsCount']||0)+'회</td><td style="font-size:11px">'+(r['profile.signedUpAt']||'').toString().substring(0,10)+'</td><td style="font-size:11px">'+(r['profile.utmSource']||'-')+'</td><td style="font-size:11px">'+(r.city||'-')+'</td></tr>');
  th+='</tbody></table>';
  document.getElementById('ct2').innerHTML=top.length?th:'<p style="color:var(--t2)">장바구니 고객 없음</p>';
}

function mch(crm){
  const cls=['var(--a2)','var(--b)','var(--g)','var(--tl)','var(--y)','var(--o)','var(--r)','var(--t2)'];
  function bars(cid,field){
    const mp={};crm.forEach(r=>{const v=r[field]||'(없음)';mp[v]=(mp[v]||0)+1;});
    const ar=Object.entries(mp).sort((a,b)=>b[1]-a[1]).slice(0,10);
    const mx=ar[0]?ar[0][1]:1;let h='';
    ar.forEach((s,i)=>{const w=s[1]/mx*100;h+='<div class="br"><div class="bl">'+s[0]+'</div><div class="bt"><div class="bf" style="width:'+w+'%;background:'+cls[i%8]+';">'+pc(s[1],crm.length)+'</div></div><div class="bv">'+fm(s[1])+'명</div></div>';});
    document.getElementById(cid).innerHTML=h||'<p style="color:var(--t2)">데이터 없음</p>';
  }
  bars('c1','profile.utmSource');
  bars('c2','profile.utmMedium');
}

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',function(){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('active'));
  this.classList.add('active');document.getElementById('pg-'+this.dataset.p).classList.add('active');
}));

init();
</script>
